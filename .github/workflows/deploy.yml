name: Deploy to Google Cloud VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd attendance-app
            echo "1. Đang kéo code mới từ Github..."
            git pull origin main || git pull origin master
            
            echo "2. Đang tắt Server cũ..."
            CLASS="server"
            CLASS+="."
            CLASS+="Server"
            pkill -f "$CLASS" || true
            
            echo "3. Đang biên dịch và khởi động lại Server ngầm..."
            nohup mvn clean compile exec:java -Dexec.mainClass="$CLASS" > server.log 2>&1 &
            
            echo "🚀 XONG! Đã cập nhật xong."
